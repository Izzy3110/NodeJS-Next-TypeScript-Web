server {
    listen 80;
    server_name pizzaservice-pfullendorf.de www.pizzaservice-pfullendorf.de;

    # Redirect HTTP to HTTPS (Uncomment this and the 443 block below once SSL is configured via Certbot)
    # return 301 https://$host$request_uri;

    # For Next.js to work properly behind a proxy, pass these headers
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Pass real IP to Next.js (important for API routes mapping IPs)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom 502 error page used when Node.js/Next.js is down during maintenance/deployment
    error_page 502 /502.html;
    location = /502.html {
        root /var/www/error_pages; # Needs mapping to server/nginx/error_pages in docker or server
        internal;
    }
}

